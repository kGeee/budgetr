# XcodeGen spec — generates Budgetr.xcodeproj from this declarative file.
# Regenerate any time with:  cd apple && xcodegen generate
# (Install once:  brew install xcodegen)
name: Budgetr
options:
  bundleIdPrefix: com.budgetr
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    # Set your Apple Developer Team ID here (or in Xcode > Signing & Capabilities).
    DEVELOPMENT_TEAM: ""

targets:
  Budgetr:
    type: application
    # One target, both platforms (Xcode multiplatform app).
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Budgetr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.budgetr.app
        PRODUCT_NAME: Budgetr
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: Budgetr/Support/Budgetr.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Budgetr
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.finance"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # CloudKit needs the background mode for remote-change push.
        INFOPLIST_KEY_UIBackgroundModes: "remote-notification"
