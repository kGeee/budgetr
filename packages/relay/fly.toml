# Fly.io config for the budgetr relay.
# First deploy:
#   fly launch --no-deploy --copy-config --name budgetr-relay   # creates the app
#   fly volumes create relay_data --size 1                      # SQLite home
#   fly deploy
app = "budgetr-relay"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DB_PATH = "/data/relay.db"

[[mounts]]
  source = "relay_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Relay must stay warm so the phone's foreground GET is snappy and the
  # desktop's debounced PUTs never hit a cold start. One tiny machine, always on.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  interval = "30s"
  timeout = "3s"
  grace_period = "10s"
  method = "GET"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
