# Tag a version (git tag v0.2.0 && git push --tags) and this publishes a
# GitHub Release with the macOS desktop app attached, so consumers can
# download and run budgetr without touching source code.
#
# Signing model:
#   * With NO Apple secrets configured the DMG is ad-hoc signed (see
#     desktop/scripts/afterpack-sign.js). The bundle is NOT notarized, so first
#     launch needs System Settings → Privacy & Security → "Open Anyway"
#     (double-clicking alone is blocked on macOS 15+). CSC_IDENTITY_AUTO_DISCOVERY
#     is forced to false so electron-builder never tries to sign with a stray
#     keychain cert.
#   * If the repo later has the CSC_LINK / CSC_KEY_PASSWORD secrets set (a
#     Developer ID Application cert + password) electron-builder signs for real;
#     add APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID and it also
#     notarizes for a dialog-free first launch. All of these are optional —
#     undefined secrets become empty strings and the build degrades gracefully
#     to the ad-hoc path above. See README for enrollment steps.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  mac-dmg:
    runs-on: macos-14
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap (env + migrate + seed)
        run: npm run setup

      - name: Build DMG
        # GitHub expands a missing secret to an EMPTY STRING, not an unset var.
        # electron-builder treats a defined-but-empty CSC_LINK as a certificate
        # *path*, resolves it to the working dir, and dies with "web not a file".
        # So when no cert is configured, strip the empty signing/notarization
        # vars here — that restores the genuinely-unset state under which the
        # ad-hoc afterPack path (desktop/scripts/afterpack-sign.js) works.
        run: |
          if [ -z "$CSC_LINK" ]; then
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
          fi
          npm run package
        env:
          # Optional code-signing secrets. When a secret is absent it arrives as
          # "" and is stripped above so the build falls back to ad-hoc signing.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Auto-discovery ON only when a cert is provided; otherwise force it
          # OFF so electron-builder can't sign with a stray keychain identity.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
          # Optional notarization secrets (only used when signing for real).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Notarize & staple the DMG
        # electron-builder notarizes and staples the .app, but NOT the .dmg
        # wrapper. On macOS 15+ opening a downloaded, un-notarized disk image can
        # throw a "cannot check for malicious software" warning on mount. So we
        # notarize the DMG itself and staple the ticket, giving a clean first
        # open even offline. Skipped when no cert is configured (ad-hoc builds).
        # Note: this changes the DMG's bytes, so its (informational) entry in
        # latest-mac.yml goes stale — harmless, because electron-updater updates
        # from the .zip (latest-mac.yml `path:`), never the DMG.
        working-directory: web
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "No signing cert configured — skipping DMG notarization."
            exit 0
          fi
          xcrun notarytool submit dist/budgetr-mac.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple dist/budgetr-mac.dmg
          xcrun stapler validate dist/budgetr-mac.dmg
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          # The DMG is the first-install download; the .zip + latest-mac.yml
          # (+ .blockmap) are the auto-update feed electron-updater reads from
          # the latest GitHub Release. Auto-update only activates on a
          # Developer ID-signed & notarized build (see the signing model above).
          files: |
            web/dist/budgetr-mac.dmg
            web/dist/budgetr-mac.zip
            web/dist/latest-mac.yml
            web/dist/*.blockmap
          generate_release_notes: true
          body: |
            **macOS (Apple Silicon / M-series only for now).** Download
            `budgetr-mac.dmg`, open it, and drag budgetr into Applications.

            **First launch:** just double-click — the app is signed with an
            Apple Developer ID and notarized by Apple, so it opens normally with
            no security warnings.

            Your data stays on your machine; settings live in
            `~/Library/Application Support/budgetr/budgetr.env`.
