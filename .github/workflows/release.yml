# Tag a version (git tag v0.2.0 && git push --tags) and this publishes a
# GitHub Release with the macOS desktop app attached, so consumers can
# download and run budgetr without touching source code.
#
# Signing model:
#   * With NO Apple secrets configured the DMG is ad-hoc signed (see
#     desktop/scripts/afterpack-sign.js). The bundle is NOT notarized, so first
#     launch needs System Settings → Privacy & Security → "Open Anyway"
#     (double-clicking alone is blocked on macOS 15+). CSC_IDENTITY_AUTO_DISCOVERY
#     is forced to false so electron-builder never tries to sign with a stray
#     keychain cert.
#   * If the repo later has the CSC_LINK / CSC_KEY_PASSWORD secrets set (a
#     Developer ID Application cert + password) electron-builder signs for real;
#     add APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID and it also
#     notarizes for a dialog-free first launch. All of these are optional —
#     undefined secrets become empty strings and the build degrades gracefully
#     to the ad-hoc path above. See README for enrollment steps.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  mac-dmg:
    runs-on: macos-14
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap (env + migrate + seed)
        run: npm run setup

      - name: Build DMG
        run: npm run package
        env:
          # Optional code-signing secrets. If unset, these expand to empty
          # strings and the build falls back to ad-hoc signing.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Auto-discovery ON only when a cert is provided; otherwise force it
          # OFF so electron-builder can't sign with a stray keychain identity.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
          # Optional notarization secrets (only used when signing for real).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: web/dist/budgetr-mac.dmg
          generate_release_notes: true
          body: |
            **macOS (Apple Silicon / M-series only for now).** Download
            `budgetr-mac.dmg`, open it, and drag budgetr into Applications.

            **First launch:** double-clicking will fail with an "unverified
            developer" / "cannot be opened" message — this is expected (the app
            isn't notarized yet). To open it:

            1. Open **System Settings → Privacy & Security**.
            2. Scroll down to the notice that budgetr was blocked, and click
               **Open Anyway**, then confirm.

            Terminal alternative: `xattr -cr /Applications/budgetr.app` then open
            it normally.

            Your data stays on your machine; settings live in
            `~/Library/Application Support/budgetr/budgetr.env`.
